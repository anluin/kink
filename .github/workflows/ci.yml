name: CI & Release

on:
    push:
        branches: [main]
        tags:
            - "*/v*"
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v1
              with:
                  deno-version: v2.x

            - name: Verify Quality
              run: |
                  deno fmt --check
                  deno lint
                  deno test --check --frozen

    publish:
        runs-on: ubuntu-latest
        needs: [test]
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v1
              with:
                  deno-version: v2.x

            - name: Extract Package Name
              run: |
                  TAG_NAME=${GITHUB_REF#refs/tags/}
                  PACKAGE_NAME=${TAG_NAME%/*}
                  echo "TARGET_PKG=$PACKAGE_NAME" >> $GITHUB_ENV

            - name: Publish @kink/${{ env.TARGET_PKG }}
              run: deno publish
              working-directory: ./packages/${{ env.TARGET_PKG }}
